# Copy this file to secrets.yml and fill in real values
# NEVER commit secrets.yml — it's in .gitignore

apiVersion: v1
kind: Secret
metadata:
  name: harvestiq-secrets
  namespace: default
type: Opaque
stringData:
  postgres-password: "your-postgres-password-here"
  groq-api-key: "your-groq-api-key-here"