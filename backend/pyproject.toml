[tool.black]
line-length = 88
target-version = ["py311"]
include = '\.pyi?$'
exclude = '''/(\.git|__pycache__|venv)/'''

[tool.isort]
profile = "black"
line_length = 88

[tool.mypy]
python_version = "3.11"
warn_return_any = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]